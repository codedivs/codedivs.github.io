<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Library</title>

  <style>
    :root {
      --bg: #111;
      --fg: #f4f4f4;
      --card-bg: #1e1e1e;
      --accent: #4ea1ff;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    #main_div {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 20px;
    }

    /* Desktop: 3 cards per row */
    @media (min-width: 900px) {
      #main_div {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .game-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.4);
    }

    .game-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      display: block;
    }

    .game-card h2 {
      margin: 8px 0 12px 0;
    }

    .game-card a {
      display: inline-block;
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    .game-card a:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="main_div"></div>

  <header> Cool online coding, language and more mind games</header>

  <script>
    "use strict";

    fetch("games_in_library.json")
      .then(response => {
        if (!response.ok) {
          throw new Error("Unable to load games JSON.");
        }
        return response.json();
      })
      .then(games => {
        const container = document.getElementById("main_div");

        games.forEach(game => {
          const card = document.createElement("div");
          card.className = "game-card";

          card.innerHTML = `
            <img src="${game.game_icon}" alt="${game.game_name}">
            <h2>${game.game_name}</h2>
            <a href="${game.game_link}">Play Game</a>
          `;

          container.appendChild(card);
        });
      })
      .catch(error => {
        console.error(error);
      });
  </script>
</body>
</html>
